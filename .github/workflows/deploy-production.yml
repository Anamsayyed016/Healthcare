name: Deploy PharmEFC to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOST: ${{ secrets.HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PORT: ${{ secrets.SSH_PORT }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
  DEPLOY_SCRIPT: /var/www/pharmefc-healthcare/current/scripts/deploy-pharmefc.sh

jobs:
  validate_secrets:
    name: "Validate SSH secrets"
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment secrets
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          set +e
          echo "Validating PharmEFC deployment secrets..."
          MISSING=0

          [ -z "$HOST" ] && echo "HOST: MISSING" && MISSING=1 || echo "HOST: SET"
          [ -z "$SSH_USER" ] && echo "SSH_USER: MISSING" && MISSING=1 || echo "SSH_USER: SET"
          [ -z "$SSH_PORT" ] && echo "SSH_PORT: MISSING" && MISSING=1 || echo "SSH_PORT: SET"

          if [ -z "$SSH_KEY_B64" ] && [ -z "$SSH_KEY" ]; then
            echo "SSH_KEY_B64 / SSH_KEY: MISSING (set SSH_KEY_B64 — recommended)"
            MISSING=1
          elif [ -n "$SSH_KEY_B64" ]; then
            echo "SSH_KEY_B64: SET (recommended)"
            TMP_KEY="$(mktemp)"
            printf '%s' "$SSH_KEY_B64" | tr -d ' \t\r\n' | base64 --decode > "$TMP_KEY"
            chmod 600 "$TMP_KEY"
            if ! ssh-keygen -y -f "$TMP_KEY" > /dev/null 2>&1; then
              echo "SSH_KEY_B64: invalid — regenerate base64 from pharmefc_deploy private key"
              MISSING=1
            fi
            rm -f "$TMP_KEY"
          else
            echo "SSH_KEY: SET (legacy PEM — prefer SSH_KEY_B64)"
            TMP_KEY="$(mktemp)"
            printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > "$TMP_KEY"
            chmod 600 "$TMP_KEY"
            if ! ssh-keygen -y -f "$TMP_KEY" > /dev/null 2>&1; then
              echo "SSH_KEY: libcrypto/parse error — use SSH_KEY_B64 instead (see deploy docs)"
              MISSING=1
            fi
            rm -f "$TMP_KEY"
          fi

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Secrets: https://github.com/Anamsayyed016/Healthcare/settings/secrets/actions"
            exit 1
          fi

          echo "All secrets validated."

  deploy:
    name: "Deploy PharmEFC via SSH"
    runs-on: ubuntu-latest
    needs: validate_secrets
    steps:
      - name: Checkout SSH helper
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: true

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          chmod +x .github/scripts/setup-deploy-ssh.sh
          .github/scripts/setup-deploy-ssh.sh "$HOME/.ssh/deploy_key"

      - name: Test SSH connection
        env:
          HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o IdentitiesOnly=yes"
          ssh $SSH_OPTS "$SSH_USER@$HOST" "echo 'SSH OK' && pm2 list | grep -E 'naukrimili|pharmefc' || pm2 list"

      - name: Run PharmEFC deploy script
        env:
          HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_SCRIPT: /var/www/pharmefc-healthcare/current/scripts/deploy-pharmefc.sh
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$SSH_USER@$HOST" "bash $DEPLOY_SCRIPT"

      - name: Verify live site
        env:
          HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o IdentitiesOnly=yes"
          ssh $SSH_OPTS "$SSH_USER@$HOST" "curl -fsSI -H 'Host: aioss.tech' http://127.0.0.1 | head -5"
